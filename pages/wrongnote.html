<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>오답노트</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h1>오답노트</h1>
</header>

<div class="container">
    <button class="smallBtn" onclick="location.href='../index.html'">홈으로</button>
    <h1>오답노트</h1>

    <div id="wrongNoteListSection">
        <div style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px;">
            <label><b>오답 유형 선택:</b> </label>
            <select id="wrongTypeFilter" onchange="loadWrongNotes()" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
                <option value="all">전체보기</option>
                <option value="wordMeaning">단어 (뜻 찾기)</option>
                <option value="wordSpelling">단어 (스펠링)</option>
                <option value="passageBlank">지문 (빈칸)</option>
            </select>
            <button class="mainBtn" onclick="startWrongNoteTest()" style="margin-left: 10px;">이 유형 재시험 시작</button>
        </div>

        <div id="wrongNoteList">
            </div>
    </div>

    <div id="wrongTestArea" style="display:none; text-align: center; padding: 40px 20px;">
        <h2 id="wrongQuestionText" style="margin-bottom: 30px;"></h2>
        <input type="text" id="wrongAnswerInput" placeholder="정답을 입력하세요" 
               style="width: 100%; max-width: 400px; padding: 15px; font-size: 1.2rem; border: 2px solid #007bff; border-radius: 8px;">
        <br><br>
        <button class="mainBtn" onclick="submitWrongTestAnswer()">정답 제출</button>
        <p style="margin-top: 20px; color: #666;">팁: 맞히면 오답노트에서 자동으로 삭제됩니다.</p>
    </div>
</div>

<script src="../app.js"></script>

</body>
</html>
