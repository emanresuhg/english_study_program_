<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학습 통계</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .stats-container { padding: 20px; max-width: 600px; margin: auto; }
        .stats-section { margin-bottom: 30px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .stat-card { padding: 15px; background: #f8f9fa; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .stat-card .label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.3rem; font-weight: bold; color: #333; }
        
        .highlight { background: #e7f3ff; grid-column: span 2; border: 1px solid #cfe2ff; }
        .highlight .value { color: #007bff; font-size: 1.8rem; }
        
        .secondary { background: #fffcf0; border: 1px solid #faebcc; }
        .secondary .value { color: #f39c12; }

        h3 { margin-top: 0; color: #444; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .nav-buttons { margin-bottom: 20px; }
    </style>
</head>

<body>

<header>
    <h1>학습 리포트</h1>
</header>

<div class="stats-container">
    
    <div class="nav-buttons">
        <button class="smallBtn" onclick="goBack()">← 이전</button>
        <button class="smallBtn" onclick="goHome()">홈</button>
    </div>

    <div class="stats-section">
        <h3>공부 기록</h3>
        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">공부한 날짜 수</span>
                <span id="studyDays" class="value">0</span>일
            </div>
            <div class="stat-card">
                <span class="label">총 공부 시간</span>
                <span id="studyTime" class="value">0분</span>
            </div>
        </div>
    </div>

    <div class="stats-section">
        <h3>테스트 통계</h3>
        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">총 문제 수</span>
                <span id="totalQuestions" class="value">0</span>
            </div>
            <div class="stat-card">
                <span class="label">총 정답 수</span>
                <span id="totalCorrect" class="value">0</span>
            </div>
            <div class="stat-card highlight">
                <span class="label">전체 정답률</span>
                <span id="totalRate" class="value">0%</span>
            </div>
        </div>
        
        <div class="stats-grid" style="margin-top: 15px;">
            <div class="stat-card secondary">
                <span class="label">단어 정답률</span>
                <span id="wordRate" class="value">0%</span>
            </div>
            <div class="stat-card secondary">
                <span class="label">지문 정답률</span>
                <span id="passageRate" class="value">0%</span>
            </div>
        </div>
    </div>

    <p style="text-align: center; color: #999; font-size: 0.8rem;">
        데이터는 브라우저에 자동으로 저장됩니다.
    </p>

</div>

<script src="../app.js"></script>
<script>
    // 페이지 로드 시 통계 데이터 표시
    document.addEventListener("DOMContentLoaded", () => {
        displayStats();
    });
</script>

</body>
</html>
