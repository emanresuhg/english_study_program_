<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지문 테스트</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .passage-input {
            border: none;
            border-bottom: 2px solid #333;
            outline: none;
            text-align: center;
            font-size: 1rem;
            font-family: inherit;
            background: #f9f9f9;
            margin: 2px 4px;
            padding: 2px;
        }
        #passageQuestion {
            line-height: 2.2;
            background: white;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 1.1rem;
            word-break: break-word;
        }
        #passageTranslationView {
            margin-top: 15px;
            padding: 15px;
            background: #f0f4f8;
            border-left: 4px solid #007bff;
            color: #444;
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <h1>지문 테스트</h1>
</header>

<div class="container">
    <button class="smallBtn" onclick="location.href='tests.html'">← 테스트 메뉴</button>

<div id="setupArea">
    <h2>테스트 설정</h2>
    
    <div style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px;">
        <p><b>1. 테스트 유형 선택</b></p>
        <label><input type="radio" name="passageType" value="blank" checked> 지문 빈칸 채우기</label>
        <label style="margin-left: 15px;"><input type="radio" name="passageType" value="rewrite"> 지문 백지 복기</label>
    </div>

    <div style="margin-bottom: 20px;">
        <p><b>2. 지문 선택</b></p>
        <div id="passageSelection" style="max-height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px;"></div>
    </div>
    
    <button class="mainBtn" onclick="startPassageTest()">테스트 시작</button>
</div>

    <div id="passageTestArea" style="display:none; margin-top: 20px;">
        <div style="margin-bottom: 15px;">
            <label><input type="checkbox" id="showTranslationOpt" onclick="toggleTranslation()"> 해석 보기</label>
        </div>

        <div id="passageQuestion"></div>
        
        <div id="passageTranslationView" style="display: none;"></div>

        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button class="mainBtn" onclick="submitPassageAnswer()">채점하기</button>
            <button class="mainBtn" onclick="nextPassage()">다음 지문</button>
        </div>
    </div>

    <div id="passageResult"></div>
</div>

<script src="../app.js"></script>
</body>
</html>
