<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>단어 테스트</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h1>단어 테스트</h1>
</header>

<div class="container">

<button onclick="location.href='tests.html'">← 테스트 메뉴</button>

<h3>테스트 유형</h3>

<div id="setupArea">
    <h2>단어 테스트 설정</h2>

    <div style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px;">
        <p><b>1. 테스트 유형 선택</b></p>
        <label style="cursor:pointer;"><input type="radio" name="wordTestType" value="meaning" checked> 뜻 맞히기 (영어 보고 뜻 쓰기)</label><br>
        <label style="cursor:pointer; margin-top:10px; display:inline-block;"><input type="radio" name="wordTestType" value="spelling"> 스펠링 맞히기 (뜻 보고 영어 쓰기)</label>
    </div>

    <div style="margin-bottom: 20px;">
        <p><b>2. 단어 세트 선택</b></p>
        <input type="text" id="wordSetSearchInput" onkeyup="filterWordSets()" 
               placeholder="세트 이름 검색..." 
               style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
        
        <div id="setSelection" style="max-height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; background:#fff;">
            </div>
    </div>

    <button class="mainBtn" onclick="startWordTest()">테스트 시작</button>
</div>

<div id="testArea" style="display:none">

<h3 id="question"></h3>

<input id="answerInput" placeholder="정답 입력">

<button onclick="submitAnswer()">제출</button>

<p id="timer"></p>

</div>

<hr>

<div id="resultArea"></div>

</div>

<script src="../app.js"></script>

<script>
    loadTestSets();
</script>

</body>
</html>
