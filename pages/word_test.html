<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>단어 테스트</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h1>단어 테스트</h1>
</header>

<div class="container">

<button onclick="location.href='tests.html'">← 테스트 메뉴</button>

<h2>세트 선택</h2>
<input type="text" id="setSearchInput" placeholder="세트 이름 검색..." oninput="filterTestSets()" style="width:100%; padding:10px; margin-bottom:10px;">

<div id="setSelection"></div>

<div id="setSelection"></div>

<h3>테스트 유형</h3>

<select id="testType">
<option value="meaning">뜻 맞히기</option>
<option value="spelling">스펠링 맞히기</option>
</select>

<br><br>

<button onclick="startWordTest()">테스트 시작</button>

<hr>

<div id="testArea" style="display:none">

<h3 id="question"></h3>

<input id="answerInput" placeholder="정답 입력">

<button onclick="submitAnswer()">제출</button>

<p id="timer"></p>

</div>

<hr>

<div id="resultArea"></div>

</div>

<script src="../app.js"></script>

</body>
</html>
