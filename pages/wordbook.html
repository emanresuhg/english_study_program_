<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wordbook</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h1>단어장</h1>
</header>

<div class="container">

<button onclick="goBack()">← 이전</button>
<button onclick="goHome()">홈</button>
  
<h2>세트 목록</h2>

<div id="setList"></div>

<h3>세트 만들기</h3>

<input id="setName" placeholder="세트 이름" onkeydown="if(event.key==='Enter'){addSet()}">

<button onclick="addSet()">세트 추가</button>

<hr>

<div id="wordSection" style="display:none">

<h2 id="currentSetTitle"></h2>

<button onclick="backToSets()">← 돌아가기</button>

<h3>단어 목록</h3>

  <input 
type="text" 
id="wordSearch" 
placeholder="단어 검색..."
oninput="searchWords()"
style="width:100%;padding:10px;margin:10px 0"
>
  
<div id="wordList"></div>

<h3>단어 추가</h3>

<input id="englishWord" placeholder="영어 단어 입력" onkeydown="if(event.key==='Enter'){document.getElementById('meanings').focus()}">

<input id="meanings" placeholder="뜻 입력(쉼표로 구분)" onkeydown="if(event.key==='Enter'){document.getElementById('meanings').focus()}">

<button onclick="addWord()">추가</button>

</div>

</div>

<script src="../app.js"></script>

<script>
loadSets()
</script>

</body>
</html>
