<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Passages</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h1>지문집</h1>
</header>

<div style="padding:20px">

<button onclick="goBack()">← 이전</button>
<button onclick="goHome()">홈</button>

  <input 
type="text"
id="passageSearch"
placeholder="지문 제목 검색..."
oninput="searchPassages()"
style="width:100%;padding:10px;margin:10px 0"
>
  
<h2>지문 목록</h2>
<div id="passageList" class="container"></div>

<hr>
<div id="passageViewSection" style="display:none; border:1px solid #ddd; padding:20px; border-radius:10px; background:#f9f9f9;">
    <h2 id="viewTitle"></h2>
    <p><strong>주제:</strong> <span id="viewTopic"></span></p>
    <hr>
    <h3>본문</h3>
    <p id="viewText" style="background:#fff; padding:15px; border-radius:5px;"></p>
    <h3>해석</h3>
    <p id="viewTranslation" style="background:#fff; padding:15px; border-radius:5px;"></p>
    <br>
    <button onclick="closePassage()">닫기</button>
</div>

<h3>지문 추가</h3>
<input id="title" placeholder="제목">
<textarea id="text" placeholder="지문"></textarea>
<textarea id="translation" placeholder="해석"></textarea>
<input id="topic" placeholder="주제 (선택)">
<button onclick="addPassage()">추가</button>

</div>

<div id="passageTestArea" style="display:none">
    <h2 id="passageTestTitle">지문 빈칸 테스트</h2>
    
    <div style="margin-bottom: 10px;">
        <label><input type="checkbox" id="showTranslationOpt" checked> 해석 함께 보기</label>
    </div>

    <div id="passageQuestion" style="line-height: 2; background: white; padding: 20px; border-radius: 10px; border: 1px solid #ddd;"></div>
    
    <div id="passageTranslationView" style="margin-top: 15px; color: #666; font-style: italic;"></div>

    <div style="margin-top: 20px;">
        <button class="mainBtn" onclick="submitPassageAnswer()">채점하기</button>
        <button class="mainBtn" onclick="nextPassage()">다음 지문</button>
    </div>
</div>

<div id="passageResult" style="margin-top: 20px; font-weight: bold;"></div>

<script src="../app.js"></script>

<script>
loadPassages()
</script>

</body>
</html>
